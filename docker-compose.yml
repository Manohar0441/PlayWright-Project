# ============================================================================
# docker-compose.yml — run the Streamz app locally in a container
# ----------------------------------------------------------------------------
#   docker compose up --build        # build + start on http://localhost:3000
#   docker compose down              # stop and remove
# ============================================================================
services:
  app:
    build: .
    image: streamz:local
    container_name: streamz
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
